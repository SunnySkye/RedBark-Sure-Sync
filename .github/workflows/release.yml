name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Derive lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.OWNER_LC }}/redbark-sure-sync
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and publish container image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Docker

            Choose one host runtime directory first. On macOS/Linux shells, an example is `export RUNTIME_DIR="$HOME/redbark-sure-sync"`. On PowerShell, choose an equivalent absolute path.

            Choose one env file path too. On macOS/Linux shells, an example is `export ENV_FILE="$HOME/redbark-sure-sync.env"`.

            Before running the first Docker command, create the env file at `$ENV_FILE` with contents like:

            ```env
            REDBARK_API_KEY=your_redbark_api_key
            SURE_BASE_URL=https://your-sure-instance.example
            SURE_API_KEY=your_sure_api_key
            DUPLICATE_AUDIT_WEBHOOK_URL=https://discord.com/api/webhooks/...
            ```

            `DUPLICATE_AUDIT_WEBHOOK_URL` is optional. The env file can live anywhere on the host as long as `--env-file` points to that exact path.

            Generate the account map once:

            ```sh
            export RUNTIME_DIR="$HOME/redbark-sure-sync"
            export ENV_FILE="$HOME/redbark-sure-sync.env"
            mkdir -p "$RUNTIME_DIR/logs"
            docker run -it --rm --env-file "$ENV_FILE" -v "$RUNTIME_DIR:/runtime" -v "$RUNTIME_DIR/logs:/app/logs" ghcr.io/${{ env.OWNER_LC }}/redbark-sure-sync:${{ steps.meta.outputs.version }} map 30 --mapfile /runtime/account_map.json --redbark-export-dir /runtime/exports --sure-export-dir /runtime/sure_exports
            ```

            That command writes the local file `"$RUNTIME_DIR/account_map.json"`.

            Then run the scheduled-safe sync command with the same `.env` file and the saved map file:

            ```sh
            docker run --rm --env-file "$ENV_FILE" -v "$RUNTIME_DIR/account_map.json:/app/account_map.json:ro" -v "$RUNTIME_DIR/exports:/app/exports" -v "$RUNTIME_DIR/logs:/app/logs" ghcr.io/${{ env.OWNER_LC }}/redbark-sure-sync:${{ steps.meta.outputs.version }} 4 --mapfile /app/account_map.json
            ```

            Dry run:

            ```sh
            docker run --rm --env-file "$ENV_FILE" -v "$RUNTIME_DIR/account_map.json:/app/account_map.json:ro" -v "$RUNTIME_DIR/exports:/app/exports" -v "$RUNTIME_DIR/logs:/app/logs" ghcr.io/${{ env.OWNER_LC }}/redbark-sure-sync:${{ steps.meta.outputs.version }} 4 --mapfile /app/account_map.json --dry-run
            ```